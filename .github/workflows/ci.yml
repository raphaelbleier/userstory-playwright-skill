name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Unit tests
        run: npm test

      - name: Full cycle against the demo app
        # generates stories -> runs Playwright -> syncs the report into a real xlsx ->
        # asserts the sheet reports exactly the one bug planted in the demo app
        run: node test/verify-demo.mjs

      - name: Installer smoke test
        run: |
          mkdir -p /tmp/target && cd /tmp/target
          node "$GITHUB_WORKSPACE/bin/cli.mjs" init
          test -f .agents/skills/user-story-testing/SKILL.md
          test -f .claude/skills/user-story-testing/SKILL.md
          test -f .kilocode/rules/user-story-testing.md
          test -f .github/agents/user-story-testing.agent.md
          test -f playwright.config.ts
          grep -q "User Story Testing" AGENTS.md

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts
          path: fixtures/test-results/
          retention-days: 7

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version bump, the changelog and the git tag
      issues: write # comment on issues included in the release
      pull-requests: write # comment on the PRs included in the release
      id-token: write # mint the OIDC token npm trusts instead of a secret
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # semantic-release reads the whole history to find the last release
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # setup-node ships an npm too old to speak OIDC. Trusted publishing needs >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci

      # No NPM_TOKEN here on purpose: with one set, semantic-release takes the token path
      # and never attempts trusted publishing.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
